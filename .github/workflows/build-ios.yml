name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor to iOS
        run: npx cap sync ios

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install CocoaPods dependencies
        run: cd ios/App && pod install --repo-update || true

      - name: Build iOS (unsigned, for simulator)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty || true

      - name: Archive simulator app
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r AfriTrade-simulator.zip App.app

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: afritrade-ios-simulator
          path: ios/App/build/Build/Products/Debug-iphonesimulator/AfriTrade-simulator.zip
          retention-days: 30

